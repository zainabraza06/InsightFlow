<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NEXUS — Autonomous Content-to-Action Agent</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050508;--surface:#0b0b12;--card:#0f0f1a;--card2:#13131f;
  --border:#1c1c2e;--border2:#252540;
  --blue:#4f8ef7;--blue-dim:rgba(79,142,247,0.1);--blue-glow:rgba(79,142,247,0.4);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,0.1);--purple-glow:rgba(139,92,246,0.3);
  --green:#10b981;--green-dim:rgba(16,185,129,0.1);--green-glow:rgba(16,185,129,0.3);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.1);--red-glow:rgba(239,68,68,0.3);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.1);
  --cyan:#06b6d4;--cyan-dim:rgba(6,182,212,0.1);
  --orange:#f97316;
  --text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--muted2:#475569;
  --mono:'JetBrains Mono',monospace;
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;}

/* ── NAV ── */
.nav{flex-shrink:0;height:54px;background:rgba(11,11,18,0.95);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;backdrop-filter:blur(12px);z-index:100;}
.nav-logo{font-size:17px;font-weight:800;color:var(--blue);letter-spacing:1.5px;
  text-shadow:0 0 20px var(--blue-glow);display:flex;align-items:center;gap:8px;}
.nav-logo svg{width:20px;height:20px;}
.nav-subtitle{font-size:11px;color:var(--muted);border-left:1px solid var(--border);padding-left:12px;}
.nav-metrics{display:flex;gap:20px;margin-left:auto;}
.nav-metric{display:flex;align-items:center;gap:6px;font-size:11px;}
.nav-metric-label{color:var(--muted);}
.nav-metric-val{color:var(--text);font-weight:600;font-family:var(--mono);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted2);}
.status-dot.active{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
.status-dot.executing{background:var(--blue);box-shadow:0 0 8px var(--blue);animation:pulse 0.8s infinite;}
.nav-actions{display:flex;gap:8px;margin-left:12px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:#5a99ff;box-shadow:0 0 16px var(--blue-glow);}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#0ece94;box-shadow:0 0 16px var(--green-glow);}
.btn-amber{background:var(--amber);color:#000;}
.btn-demo{background:linear-gradient(135deg,#4f8ef7,#8b5cf6);color:#fff;border:none;}
.btn-demo:hover{opacity:0.9;box-shadow:0 0 20px rgba(139,92,246,0.4);}

/* ── LAYOUT ── */
.workspace{flex:1;display:grid;grid-template-columns:340px 1fr 340px;grid-template-rows:1fr 180px;overflow:hidden;gap:0;}
.col{overflow-y:auto;border-right:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:12px;}
.col:last-child{border-right:none;}
.col-center{border-right:1px solid var(--border);}
.log-bar{grid-column:1/-1;border-top:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;}

@media(max-width:1200px){.workspace{grid-template-columns:1fr 1fr;grid-template-rows:auto auto 180px;}
  .col-center{grid-column:1/-1;border-right:none;border-bottom:1px solid var(--border);}
  .log-bar{grid-column:1/-1;}}
@media(max-width:768px){.workspace{grid-template-columns:1fr;grid-template-rows:auto;overflow-y:auto;}
  .col,.log-bar{overflow:visible;}}

/* ── PANEL ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;flex-shrink:0;}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.panel-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px;}
.panel-title-dot{width:6px;height:6px;border-radius:50%;}
.panel-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}

/* ── INPUTS ── */
.field{margin-bottom:10px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;}
.field textarea,.field input,.field select{
  width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-sm);
  color:var(--text);padding:9px 12px;font-size:12px;font-family:inherit;outline:none;resize:vertical;
  transition:border-color 0.2s;}
.field textarea:focus,.field input:focus,.field select:focus{border-color:var(--blue);}
.field select option{background:var(--card);}
.seed-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.seed{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  background:var(--card2);border:1px solid var(--border2);color:var(--text2);transition:all 0.2s;}
.seed:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.seed.active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.toggle-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin:6px 0;}
.toggle{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background 0.3s;flex-shrink:0;}
.toggle.on{background:var(--blue);}
.toggle.off{background:var(--border2);}
.toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:7px;background:#fff;top:2px;transition:left 0.3s;}
.toggle.on::after{left:16px;}
.toggle.off::after{left:2px;}
.upload-zone{border:1px dashed var(--border2);border-radius:var(--r-sm);padding:10px;text-align:center;cursor:pointer;font-size:11px;color:var(--muted);transition:all 0.2s;}
.upload-zone:hover{border-color:var(--blue);color:var(--blue);}
.upload-zone.has-file{border-color:var(--green);color:var(--green);}

/* ── CREDIBILITY ── */
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.cred-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;}
.cred-type{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.cred-score{font-size:22px;font-weight:800;margin-bottom:4px;}
.cred-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.cred-fill{height:100%;border-radius:2px;transition:width 1s ease;}

/* ── CONTRADICTION ── */
.cont-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:8px;}
.cont-sides{display:grid;grid-template-columns:1fr 1fr;}
.cont-side{padding:10px;}
.cont-side-a{background:rgba(239,68,68,0.05);border-right:1px solid var(--border);}
.cont-side-b{background:rgba(245,158,11,0.05);}
.cont-src-label{font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:4px;}
.cont-claim{font-size:11px;color:var(--text);line-height:1.4;}
.cont-footer{padding:10px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}
.cont-expand{cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-top:1px solid var(--border);font-size:10px;color:var(--blue);}
.inv-steps{padding:8px 10px;background:rgba(79,142,247,0.04);}
.inv-step{font-size:10px;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border);}

/* ── AGENT CARDS ── */
.agent-arena{display:flex;flex-direction:column;gap:10px;}
.agent-card{border-radius:var(--r-sm);padding:14px;transition:all 0.5s;opacity:0;transform:translateY(16px);}
.agent-card.visible{opacity:1;transform:translateY(0);}
.agent-orion{background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.2);box-shadow:0 0 20px rgba(16,185,129,0.05);}
.agent-raven{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.2);box-shadow:0 0 20px rgba(239,68,68,0.05);}
.agent-cipher{background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.2);box-shadow:0 0 20px rgba(139,92,246,0.05);}
.agent-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.agent-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.avatar-orion{background:rgba(16,185,129,0.2);color:var(--green);}
.avatar-raven{background:rgba(239,68,68,0.2);color:var(--red);}
.avatar-cipher{background:rgba(139,92,246,0.2);color:var(--purple);}
.agent-meta{flex:1;}
.agent-name{font-size:13px;font-weight:700;}
.agent-persona{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.agent-conf-badge{font-size:12px;font-weight:800;font-family:var(--mono);}
.insight-text{font-size:12px;color:var(--text);line-height:1.5;margin-bottom:6px;min-height:36px;}
.impact-text{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:6px;}
.key-signal-row{display:flex;align-items:flex-start;gap:6px;font-size:11px;}
.key-signal-label{color:var(--muted);flex-shrink:0;}
.key-signal-val{color:var(--blue);font-style:italic;}
.conf-row{margin-top:8px;}
.conf-track{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:4px;}
.conf-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.conf-label-row{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);}

/* ── RESOLVER ── */
.resolver-card{background:linear-gradient(135deg,rgba(6,182,212,0.05),rgba(139,92,246,0.05));
  border:1px solid rgba(6,182,212,0.2);border-radius:var(--r-sm);padding:16px;}
.resolver-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.resolver-avatar{width:32px;height:32px;border-radius:50%;background:rgba(6,182,212,0.15);color:var(--cyan);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;}
.resolver-label{font-size:11px;font-weight:700;color:var(--cyan);}
.resolver-conf{font-size:32px;font-weight:800;color:var(--cyan);font-family:var(--mono);text-align:center;margin:10px 0;
  text-shadow:0 0 20px rgba(6,182,212,0.5);}
.final-insight{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.5;}
.summary-text{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px;}
.uncertainty-text{font-size:11px;color:var(--amber);font-style:italic;}
.inv-path-title{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;margin:10px 0 6px;}

/* ── RADAR ── */
.radar-wrap{display:flex;align-items:center;justify-content:center;padding:8px 0;}
.radar-legend{display:flex;flex-direction:column;gap:4px;margin-left:12px;}
.radar-legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);}
.radar-legend-dot{width:8px;height:8px;border-radius:50%;}

/* ── CAUSAL CHAIN SVG ── */
.chain-svg-wrap{width:100%;overflow-x:auto;padding:8px 0;}
.chain-svg-wrap svg{min-width:600px;}

/* ── STEP LIST ── */
.step-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;cursor:pointer;
  transition:border-color 0.2s;margin-bottom:8px;}
.step-item:hover{border-color:var(--border2);}
.step-row{display:flex;align-items:flex-start;gap:10px;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-body{flex:1;}
.step-action{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px;}
.step-sub{font-size:10px;color:var(--muted);font-style:italic;margin-bottom:4px;}
.step-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-amber{background:var(--amber-dim);color:var(--amber);}
.badge-gray{background:rgba(100,116,139,0.1);color:var(--muted);}
.badge-purple{background:var(--purple-dim);color:var(--purple);}
.step-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none;}
.step-detail.open{display:block;}
.detail-row{display:flex;gap:8px;margin-bottom:4px;font-size:11px;}
.detail-key{color:var(--muted);min-width:70px;flex-shrink:0;}
.detail-val{color:var(--text2);}

/* ── OUTCOME ── */
.before-after{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ba-col{background:var(--card2);border-radius:var(--r-sm);padding:12px;border:1px solid var(--border);}
.ba-header{font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:8px;letter-spacing:0.5px;}
.ba-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px;}
.ba-row:last-child{border-bottom:none;}
.ba-row.changed{border-left:2px solid var(--amber);padding-left:5px;}
.ba-key{color:var(--muted);font-size:10px;}
.ba-val{font-weight:600;font-family:var(--mono);font-size:11px;}
.metrics-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.metric-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center;}
.metric-lbl{font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;}
.metric-val{font-size:18px;font-weight:800;color:var(--blue);font-family:var(--mono);}

/* ── ANTIGRAVITY FLOW ── */
.ag-flow{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;}
.ag-flow-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;
  display:flex;align-items:center;gap:6px;}
.ag-flow-svg{width:100%;}

/* ── LOG ── */
.log-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.log-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px;}
.log-live{font-size:9px;color:var(--green);display:flex;align-items:center;gap:4px;}
.log-body{flex:1;overflow-y:auto;padding:8px 16px;font-family:var(--mono);font-size:11px;}
.log-line{margin-bottom:2px;line-height:1.5;color:#00ff88;}
.log-line.fail{color:var(--red);}
.log-line.recover{color:var(--amber);}
.log-line.info{color:var(--blue);}
.log-line.real{color:#a78bfa;font-weight:600;}
.log-empty{color:var(--muted2);font-style:italic;}

/* ── BASELINE TABLE ── */
.bl-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px;}
.bl-table th{text-align:left;padding:5px 8px;color:var(--muted);border-bottom:1px solid var(--border);}
.bl-table td{padding:5px 8px;border-bottom:1px solid var(--border);}
.check-y{color:var(--green);font-weight:700;}
.check-n{color:var(--red);font-weight:700;}

/* ── TEMPORAL ── */
.temporal-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;margin-bottom:10px;}
.trend-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:6px;}
.trend-worse{background:var(--red-dim);color:var(--red);}
.trend-better{background:var(--green-dim);color:var(--green);}
.trend-stable{background:var(--amber-dim);color:var(--amber);}
.trend-desc{font-size:11px;color:var(--text2);line-height:1.4;}
.trend-rate{font-size:10px;color:var(--amber);margin-top:4px;}

/* ── ANIMATIONS ── */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--blue-glow);}50%{box-shadow:0 0 24px var(--blue-glow),0 0 48px rgba(79,142,247,0.15);}}
@keyframes flashRed{0%,100%{background:transparent;}30%,70%{background:rgba(239,68,68,0.25);}}
@keyframes nodeAppear{from{transform:scale(0);}to{transform:scale(1);}}
@keyframes drawLine{from{stroke-dashoffset:200;}to{stroke-dashoffset:0;}}
@keyframes typing{from{width:0;}to{width:100%;}}
.animate-fadeInUp{animation:fadeInUp 0.4s ease forwards;}
.animate-slideIn{animation:slideIn 0.3s ease forwards;}
.spinner{width:14px;height:14px;border:2px solid rgba(79,142,247,0.3);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}

/* ── MISC ── */
.section-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.empty-state{text-align:center;padding:24px;color:var(--muted2);font-size:12px;}
.empty-icon{font-size:28px;margin-bottom:8px;}
.divider{height:1px;background:var(--border);margin:10px 0;}
.chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;}
.what-if-item{padding:8px 0;border-bottom:1px solid var(--border);}
.what-if-item:last-child{border-bottom:none;}
.what-if-key{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.what-if-val{font-size:11px;color:var(--text2);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ─── SEED DATA ─── */
const SEEDS = {
  sales:{label:'📉 Sales Drop',text:'Regional Q3 sales report: Lahore division shows 25% decline in orders. Field reps report customer churn to competitor offering 15% lower pricing on electronics.',
    csv:'month,orders,revenue_pkr,returns\nJuly,1200,2400000,45\nAugust,980,1960000,67\nSeptember,900,1800000,89',
    url:'',topic:'sales',domain:'Business'},
  fuel:{label:'⛽ Fuel Hike',text:'Breaking: Government announces 18% increase in petroleum prices effective immediately. Diesel up PKR 22/litre. Transport associations warn of 30% logistics cost surge.',
    csv:'date,diesel_pkr,transport_index,delivery_complaints\n2026-05-01,278,100,12\n2026-05-08,290,108,28\n2026-05-15,312,119,54',
    url:'',topic:'fuel',domain:'Logistics'},
  supply:{label:'🏭 Supply Chain',text:'Port congestion at Karachi delays shipments average 12 days. Three major electronics suppliers halting production due to power rationing. Warehouse manager email says stock is fine for 6 weeks.',
    csv:'sku,stock_units,days_remaining,supplier_status,last_updated\nSKU-001,450,12,delayed,2026-05-10\nSKU-002,80,2,critical,2026-05-14\nSKU-003,1200,31,normal,2026-04-28',
    url:'',topic:'supply',domain:'Logistics'},
  health:{label:'🏥 Hospital Supply',

/* ─── TYPEWRITER HOOK ─── */
function useTypewriter(text,speed=12){
  const [out,setOut]=useState('');
  useEffect(()=>{
    if(!text){setOut('');return;}
    setOut('');
    let i=0;
    const id=setInterval(()=>{
      if(i<text.length){setOut(text.slice(0,i+1));i++;}
      else clearInterval(id);
    },speed);
    return()=>clearInterval(id);
  },[text]);
  return out;
}

/* ─── SVG RADAR CHART ─── */
function RadarChart({agents=[]}){
  const cx=110,cy=110,r=80;
  const dims=['Confidence','Specificity','Impact','Clarity','Evidence'];
  const n=dims.length;
  const colors=['#10b981','#ef4444','#8b5cf6'];

  function polar(angle,dist){
    return[cx+dist*Math.cos(angle-Math.PI/2),cy+dist*Math.sin(angle-Math.PI/2)];
  }
  function agentVals(ag){
    const c=ag.confidence||70;
    return[c,ag.insight?.length>100?Math.min(c+10,95):Math.max(c-10,50),
           ag.impact?.length>60?Math.min(c+5,90):Math.max(c-15,45),
           ag.recommended_action?.length>50?Math.min(c+8,92):Math.max(c-12,48),
           c>75?Math.min(c+5,90):Math.max(c-10,55)];
  }
  function polygon(vals){return vals.map((v,i)=>{const[x,y]=polar((i/n)*2*Math.PI,(v/100)*r);return`${x},${y}`;}).join(' ');}
  const axisAngles=dims.map((_,i)=>(i/n)*2*Math.PI);

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width="220" height="220" viewBox="0 0 220 220">
        {/* Grid */}
        {[0.25,0.5,0.75,1].map((p,i)=>(
          <polygon key={i} points={dims.map((_,di)=>{const[x,y]=polar((di/n)*2*Math.PI,r*p);return`${x},${y}`;}).join(' ')}
            fill="none" stroke={i===3?'#252540':'#1c1c2e'} strokeWidth="1"/>
        ))}
        {/* Axes */}
        {axisAngles.map((a,i)=>{const[x,y]=polar(a,r);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#1c1c2e" strokeWidth="1"/>;  })}
        {/* Agent polygons */}
        {agents.map((ag,i)=>(
          <polygon key={i} points={polygon(agentVals(ag))} fill={colors[i]+'22'} stroke={colors[i]} strokeWidth="1.5" opacity="0.9"/>
        ))}
        {/* Center dot */}
        <circle cx={cx} cy={cy} r="3" fill="#252540"/>
        {/* Labels */}
        {dims.map((d,i)=>{const[lx,ly]=polar(axisAngles[i],r+18);
          return<text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill="#64748b">{d}</text>;})}
      </svg>
      {agents.length>0&&<div className="radar-legend">
        {['Orion','Raven','Cipher'].slice(0,agents.length).map((n,i)=>(
          <div key={i} className="radar-legend-item">
            <div className="radar-legend-dot" style={{background:colors[i]}}/>
            <span>{n}</span>
          </div>
        ))}
      </div>}
    </div>
  );
}

/* ─── SVG CAUSAL CHAIN ─── */
function CausalChainSVG({chain}){
  if(!chain.length)return<div className="empty-state" style={{padding:'16px 0'}}><div>Plan chain to see visualization</div></div>;
  const nodeR=26,spacing=120,pad=50;
  const W=pad*2+chain.length*spacing;const H=160;const cy=65;
  function nc(s){return{'DONE':'#10b981','FAILED':'#ef4444','RECOVERED':'#f59e0b','RUNNING':'#4f8ef7','PENDING':'#1e293b'}[s]||'#1e293b';}
  function ns(s){return{'DONE':'#10b981','FAILED':'#ef4444','RECOVERED':'#f59e0b','RUNNING':'#4f8ef7','PENDING':'#334155'}[s]||'#334155';}
  const nodes=chain.map((a,i)=>({cx:pad+i*spacing,cy,step:a.step,action:(a.action||'').substring(0,18),status:a.status||'PENDING'}));

  return(
    <div className="chain-svg-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',minWidth:'500px'}}>
        {/* Connectors */}
        {nodes.slice(0,-1).map((n,i)=>{
          const nxt=nodes[i+1];
          const done=n.status==='DONE'||n.status==='RECOVERED';
          return<g key={i}>
            <line x1={n.cx+nodeR} y1={n.cy} x2={nxt.cx-nodeR} y2={nxt.cy}
              stroke={done?'#10b981':'#1e293b'} strokeWidth="2"
              strokeDasharray={done?'none':'6,4'}/>
            <polygon points={`${nxt.cx-nodeR},${nxt.cy-5} ${nxt.cx-nodeR+10},${nxt.cy} ${nxt.cx-nodeR},${nxt.cy+5}`}
              fill={done?'#10b981':'#1e293b'}/>
          </g>;
        })}
        {/* Nodes */}
        {nodes.map((n)=>{
          const glow=n.status==='RUNNING';
          return<g key={n.step}>
            {glow&&<circle cx={n.cx} cy={n.cy} r={nodeR+8} fill="none" stroke="#4f8ef7" strokeWidth="1" opacity="0.4">
              <animate attributeName="r" values={`${nodeR};${nodeR+12};${nodeR}`} dur="1.5s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" repeatCount="indefinite"/>
            </circle>}
            <circle cx={n.cx} cy={n.cy} r={nodeR} fill={nc(n.status)} stroke={ns(n.status)} strokeWidth="2"/>
            <text x={n.cx} y={n.cy} textAnchor="middle" dominantBaseline="middle" fontSize="14" fontWeight="800" fill="white">{n.step}</text>
            <text x={n.cx} y={n.cy+nodeR+14} textAnchor="middle" fontSize="8" fill="#94a3b8">{n.action}</text>
            <text x={n.cx} y={n.cy+nodeR+26} textAnchor="middle" fontSize="7" fill={nc(n.status)} fontWeight="700">{n.status}</text>
          </g>;
        })}
        {/* Step labels at top */}
        {nodes.map((n)=>(
          <text key={`lbl-${n.step}`} x={n.cx} y={cy-nodeR-12} textAnchor="middle" fontSize="8" fill="#475569">STEP {n.step}</text>
        ))}
      </svg>
    </div>
  );
}

/* ─── DEBATE INTENSITY METER ─── */
function DisagreementMeter({agents}){
  if(!agents||agents.length<2)return null;
  const confs=agents.map(a=>a.confidence||70);
  const mx=Math.max(...confs),mn=Math.min(...confs);
  const spread=mx-mn;
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(Math.min(spread*2.5,100)),200);return()=>clearTimeout(t);},[spread]);
  const color=spread>20?'var(--red)':spread>10?'var(--amber)':'var(--green)';
  const label=spread>20?'HIGH CONFLICT':spread>10?'MODERATE':'LOW — CONSENSUS';
  return(
    <div style={{background:'var(--card2)',border:`1px solid ${spread>20?'rgba(239,68,68,0.3)':spread>10?'rgba(245,158,11,0.2)':'rgba(16,185,129,0.2)'}`,borderRadius:'var(--r-sm)',padding:'10px',marginBottom:'10px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
        <span style={{fontSize:'10px',color:'var(--muted)',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.5px'}}>⚡ Debate Intensity</span>
        <span style={{fontSize:'11px',fontWeight:'800',color}}>{label}</span>
      </div>
      <div style={{height:'6px',background:'var(--border2)',borderRadius:'3px',overflow:'hidden'}}>
        <div style={{height:'100%',width:`${w}%`,background:color,borderRadius:'3px',transition:'width 1.2s ease'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'9px',color:'var(--muted)',marginTop:'5px'}}>
        <span style={{color:'var(--green)'}}>Consensus</span>
        <span>Confidence spread: <b style={{color}}>{spread.toFixed(0)} pts</b> · Max: {mx}% · Min: {mn}%</span>
        <span style={{color:'var(--red)'}}>Conflict</span>
      </div>
      {spread>20&&<div style={{fontSize:'10px',color:'var(--amber)',marginTop:'6px',padding:'5px 8px',background:'var(--amber-dim)',borderRadius:'4px'}}>
        ⚠ Agents strongly disagree — Resolver applied extra verification before synthesis
      </div>}
    </div>
  );
}

/* ─── PROJECTED RISK TIMELINE ─── */
function RiskTimeline({executeData}){
  if(!executeData)return null;
  const chain=executeData.chain||[];
  const completed=chain.filter(a=>a.status==='DONE'||a.status==='RECOVERED').length;
  const recovered=chain.filter(a=>a.status==='RECOVERED').length;
  const baseRisk=85;
  const dropPerStep=15;
  const finalRisk=Math.max(baseRisk-completed*dropPerStep+(recovered*5),5);

  const pts=[
    {h:0,r:baseRisk},
    {h:12,r:Math.min(baseRisk,Math.max(finalRisk+30,20))},
    {h:24,r:Math.max(finalRisk+20,10)},
    {h:36,r:Math.max(finalRisk+12,8)},
    {h:48,r:Math.max(finalRisk+6,6)},
    {h:72,r:finalRisk},
  ];
  const W=280,H=95,pL=28,pB=18,pT=8;
  const iW=W-pL-12,iH=H-pB-pT;
  const px=h=>pL+h/72*iW;
  const py=r=>pT+iH-(r/100*iH);
  const pathD='M '+pts.map(p=>`${px(p.h).toFixed(1)},${py(p.r).toFixed(1)}`).join(' L ');
  const fillD=pathD+` L ${px(72).toFixed(1)},${py(0).toFixed(1)} L ${px(0).toFixed(1)},${py(0).toFixed(1)} Z`;
  const rColor=r=>r<30?'var(--green)':r<55?'var(--amber)':'var(--red)';

  return(
    <div style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',padding:'10px',marginTop:'10px'}}>
      <div style={{fontSize:'10px',fontWeight:'700',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px',display:'flex',justifyContent:'space-between'}}>
        <span>📉 Projected Risk Recovery (72h)</span>
        <span style={{color:rColor(finalRisk),fontFamily:'var(--mono)'}}>{baseRisk}% → {finalRisk}%</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%'}}>
        {[0,25,50,75,100].map(r=>(
          <g key={r}>
            <line x1={pL} y1={py(r)} x2={W-12} y2={py(r)} stroke="#1c1c2e" strokeWidth="1" strokeDasharray="3,3"/>
            <text x={pL-3} y={py(r)} textAnchor="end" dominantBaseline="middle" fontSize="7" fill="#475569">{r}%</text>
          </g>
        ))}
        {[0,24,48,72].map(h=>(
          <text key={h} x={px(h)} y={H-3} textAnchor="middle" fontSize="7" fill="#475569">{h}h</text>
        ))}
        <path d={fillD} fill="rgba(239,68,68,0.07)"/>
        <path d={pathD} fill="none" stroke="var(--red)" strokeWidth="2" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={px(p.h)} cy={py(p.r)} r="3.5" fill={rColor(p.r)} stroke="var(--card2)" strokeWidth="1.5"/>
        ))}
        <text x={px(72)+5} y={py(finalRisk)} dominantBaseline="middle" fontSize="8" fontWeight="800" fill={rColor(finalRisk)}>{finalRisk}%</text>
      </svg>
      <div style={{display:'flex',gap:'12px',fontSize:'10px',marginTop:'4px'}}>
        <span style={{color:'var(--green)'}}>● &lt;30% Safe</span>
        <span style={{color:'var(--amber)'}}>● 30–55% Monitor</span>
        <span style={{color:'var(--red)'}}>● &gt;55% Critical</span>
        <span style={{color:'var(--muted)',marginLeft:'auto'}}>{completed}/{chain.length} steps done</span>
      </div>
    </div>
  );
}

        <button className="btn btn-primary" style={{width:'100%'}} onClick={handleIngest} disabled={loading}>
          {loading?<><span className="spinner"/>&nbsp;Ingesting sources...</>:'⬡ Ingest All Sources'}
        </button>
        {ingestData&&<button className="btn btn-ghost" style={{width:'100%',marginTop:'8px'}} onClick={onAnalyzeClick} disabled={analyzing}>
          {analyzing?<><span className="spinner"/>&nbsp;Running 5 agents...</>:'▶ Run Agent Analysis'}
        </button>}
      </div>

      {/* Source Intelligence */}
      {ingestData&&(
        <div className="panel animate-fadeInUp">
          <div className="panel-header">
            <div className="panel-title"><div className="panel-title-dot" style={{background:'var(--cyan)'}}/>Source Intelligence</div>
            <span className="panel-badge badge-blue">confidence: {ingestData.contradictions?.overall_signal_confidence||'--'}</span>
          </div>

          <div className="section-label">Credibility Matrix</div>
          <div className="cred-grid">
            {Object.entries(credMap).map(([t,s])=>(
              <div key={t} className="cred-item">
                <div className="cred-type">{t.replace('_',' ')}</div>
                <div className="cred-score" style={{color:scoreColor(s)}}>{Math.round(s*100)}%</div>
                <div className="cred-bar"><div className="cred-fill" style={{width:`${s*100}%`,background:scoreColor(s)}}/></div>
              </div>
            ))}
          </div>

          {temporal.has_trend&&(
            <div className="temporal-box">
              <span className={`trend-pill ${temporal.trend_direction==='worsening'?'trend-worse':temporal.trend_direction==='improving'?'trend-better':'trend-stable'}`}>
                {temporal.trend_direction==='worsening'?'↘':'↗'} {(temporal.trend_direction||'').toUpperCase()}
              </span>
              <div className="trend-desc">{temporal.trend_description}</div>
              <div className="trend-rate">Rate of change: {temporal.rate_of_change}</div>
            </div>
          )}

          {contList.length>0&&<>
            <div className="section-label">Contradictions Detected ({contList.length})</div>
            {contList.map((c,i)=>(
              <div key={i} className="cont-card">
                <div className="cont-sides">
                  <div className="cont-side cont-side-a">
                    <div className="cont-src-label" style={{color:'var(--red)'}}>{c.source_a_type}</div>
                    <div className="cont-claim">{c.claim_a}</div>
                  </div>
                  <div className="cont-side cont-side-b">
                    <div className="cont-src-label" style={{color:'var(--amber)'}}>{c.source_b_type}</div>
                    <div className="cont-claim">{c.claim_b}</div>
                  </div>
                </div>
                <div className="cont-footer">✓ {c.resolution_action} <span style={{color:'var(--muted)',marginLeft:'4px'}}>→ Trust: {c.trusted_source}</span></div>
                <div className="cont-expand" onClick={()=>setExpandedCont(e=>({...e,[i]:!e[i]}))}>
                  <span>Investigation Path</span><span>{expandedCont[i]?'▲':'▼'}</span>
                </div>
                {expandedCont[i]&&<div className="inv-steps">
                  {(c.investigation_path||[]).map((s,j)=><div key={j} className="inv-step">{j+1}. {s}</div>)}
                </div>}
              </div>
            ))}
          </>}

          {noiseFiltered.length>0&&<>
            <div className="section-label">Excluded (score &lt; 0.30)</div>
            <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
              {noiseFiltered.map((t,i)=><span key={i} className="chip" style={{background:'rgba(100,116,139,0.1)',color:'var(--muted)'}}>{t}</span>)}
            </div>
          </>}
        </div>
      )}
    </div>
  );
}

/* ─── CENTER COLUMN ─── */
function CenterCol({analysisData}){
  const [vis,setVis]=useState([false,false,false]);
  const agents=analysisData?.agents||[];
  const resolved=analysisData?.resolved||{};

  useEffect(()=>{
    if(!analysisData)return;
    setVis([false,false,false]);
    [0,1,2].forEach(i=>setTimeout(()=>setVis(v=>{const n=[...v];n[i]=true;return n;}),i*250));
  },[analysisData]);

  const agentCfg=[
    {cls:'agent-orion',avatarCls:'avatar-orion',color:'#10b981',char:'O',nameColor:'var(--green)'},
    {cls:'agent-raven',avatarCls:'avatar-raven',color:'#ef4444',char:'R',nameColor:'var(--red)'},
    {cls:'agent-cipher',avatarCls:'avatar-cipher',color:'#8b5cf6',char:'C',nameColor:'var(--purple)'},
  ];

  return(
    <div className="col col-center">
      <AntigravityFlow running={!!analysisData}/>

      <div className="panel" style={{flexShrink:0}}>
        <div className="panel-header">
          <div className="panel-title"><div className="panel-title-dot" style={{background:'var(--purple)'}}/>Agent Debate Arena</div>
          {analysisData&&<span className="panel-badge badge-purple">weighted: {analysisData.weighted_confidence?.toFixed(1)}%</span>}
        </div>

        {!analysisData?(
          <div className="empty-state"><div className="empty-icon">⚡</div><div>Run analysis to start agent debate</div></div>
        ):(
          <div className="agent-arena">
            {agents.map((ag,i)=>(
              <AgentCard key={i} ag={ag} cfg={agentCfg[i]} visible={vis[i]}/>
            ))}
          </div>
        )}
      </div>

      {analysisData&&(
        <div className="panel animate-fadeInUp">
          <div className="panel-header">
            <div className="panel-title"><div className="panel-title-dot" style={{background:'var(--cyan)'}}/>Agent Confidence Radar</div>
          </div>
          <RadarChart agents={agents}/>
          <DisagreementMeter agents={agents}/>
        </div>
      )}

      {analysisData&&(
        <div className="resolver-card animate-fadeInUp">
          <div className="resolver-header">
            <div className="resolver-avatar">⬡</div>
            <div>
              <div className="resolver-label">Resolver — Final Synthesis</div>
              <div style={{fontSize:'9px',color:'var(--muted)'}}>Senior AI Analyst · consensus</div>
            </div>
            <div style={{marginLeft:'auto'}}>
              <div className="resolver-conf">{resolved.confidence||'--'}%</div>
            </div>
          </div>
          <div className="final-insight">{resolved.final_insight||'—'}</div>
          <div className="summary-text">{resolved.situation_summary||''}</div>
          <div className="uncertainty-text">{resolved.remaining_uncertainty||''}</div>
          {(resolved.investigation_path||[]).length>0&&<>
            <div className="inv-path-title">Investigation Path</div>
            {resolved.investigation_path.map((s,i)=>(
              <div key={i} className="inv-step">{i+1}. {s}</div>
            ))}
          </>}
        </div>
      )}
    </div>
  );
}

function AgentCard({ag,cfg,visible}){
  const insight=useTypewriter(visible?ag.insight:'',10);
  return(
    <div className={`agent-card ${cfg.cls}${visible?' visible':''}`}>
      <div className="agent-header">
        <div className={`agent-avatar ${cfg.avatarCls}`}>{cfg.char}</div>
        <div className="agent-meta">
          <div className="agent-name" style={{color:cfg.nameColor}}>{ag.agent}</div>
          <div className="agent-persona" style={{color:cfg.color}}>{ag.persona}</div>
        </div>
        <div className="agent-conf-badge" style={{color:cfg.color}}>{ag.confidence}%</div>
      </div>
      <div className="insight-text">{insight}<span style={{opacity:insight.length<(ag.insight||'').length?1:0,animation:'pulse 0.7s infinite'}}>▌</span></div>
      <div className="impact-text">{ag.impact}</div>
      <div className="key-signal-row">
        <span className="key-signal-label">KEY:</span>
        <span className="key-signal-val">{ag.key_signal}</span>
      </div>
      <div className="conf-row">
        <div className="conf-label-row"><span>Confidence</span><span style={{color:cfg.color}}>{ag.confidence}%</span></div>
        <ConfBar val={ag.confidence} color={cfg.color}/>
      </div>
    </div>
  );
}

/* ─── RIGHT COLUMN ─── */
function RightCol({analysisData,onExecute,executeData}){
  const [chain,setChain]=useState([]);
  const [executing,setExecuting]=useState(false);
  const [expandedStep,setExpandedStep]=useState({});
  const [baseline,setBaseline]=useState(null);
  const [flashStep,setFlashStep]=useState(null);
  const [whatIfData,setWhatIfData]=useState(null);
  const [whatIfLoading,setWhatIfLoading]=useState(false);
  const [activeWhatIf,setActiveWhatIf]=useState(null);

  const WHAT_IF_PRESETS=[
    {label:'Budget ×2',key:'budget_2x',mods:{max_budget_pkr:1000000},desc:'Double budget'},
    {label:'Budget ÷2',key:'budget_half',mods:{max_budget_pkr:250000},desc:'Half budget — forces constraint violations'},
    {label:'Crisis Mode',key:'crisis',mods:{max_budget_pkr:2000000,max_response_time_hours:1,urgency_level:'critical'},desc:'Unlimited budget, 1h response window'},
    {label:'Minimal Staff',key:'staff_min',mods:{available_staff:1,max_budget_pkr:200000},desc:'1 staff only — extreme constraints'},
  ];

  async function runWhatIf(preset){
    if(!analysisData){alert('Run analysis first');return;}
    setWhatIfLoading(true);setActiveWhatIf(preset.key);setWhatIfData(null);
    try{
      const r=await fetch('/what-if',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({modifications:preset.mods})});
      const d=await r.json();
      setWhatIfData({...d,preset});
    }catch(e){alert('What-if failed: '+e.message);}
    setWhatIfLoading(false);
  }

  useEffect(()=>{if(analysisData?.action_chain)setChain(analysisData.action_chain);},[analysisData]);
  useEffect(()=>{if(executeData?.chain)setChain(executeData.chain);},[executeData]);

  async function handleExecute(){
    setExecuting(true);
    try{
      const r=await fetch('/execute',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chain,domain:analysisData?.domain||'Business'})});
      const d=await r.json();
      // Animate step 3 failure if present
      const s3=(d.chain||[]).find(a=>a.step===3);
      if(s3?.status==='RECOVERED'){setFlashStep(3);setTimeout(()=>setFlashStep(null),2000);}
      setChain(d.chain||chain);
      onExecute(d);
    }catch(e){alert('Execution failed: '+e.message);}
    setExecuting(false);
  }

  async function loadBaseline(){
    const r=await fetch('/baseline-comparison');
    setBaseline(await r.json());
  }

  const modCount=chain.filter(a=>a.was_modified).length;
  const totalCost=analysisData?.total_estimated_cost_pkr||0;
  const totalTime=analysisData?.total_estimated_time_minutes||0;

  return(
    <div className="col">
      {/* Chain Panel */}
      <div className="panel">
        <div className="panel-header">
          <div className="panel-title"><div className="panel-title-dot" style={{background:'var(--green)'}}/>Causal Action Chain</div>
          {analysisData&&<span className="panel-badge badge-blue">PKR {(totalCost/1000).toFixed(0)}K · {totalTime}m</span>}
        </div>

        {!analysisData?(
          <div className="empty-state"><div className="empty-icon">🔗</div><div>Waiting for agent analysis</div></div>
        ):(
          <>
            <CausalChainSVG chain={chain}/>
            {modCount>0
              ?<div style={{background:'var(--amber-dim)',border:'1px solid var(--amber)',borderRadius:'6px',padding:'6px 10px',fontSize:'11px',color:'var(--amber)',marginBottom:'10px'}}>
                 ⚠ {modCount} action{modCount>1?'s':''} modified by constraint checker
               </div>
              :<div style={{background:'var(--green-dim)',border:'1px solid var(--green)',borderRadius:'6px',padding:'6px 10px',fontSize:'11px',color:'var(--green)',marginBottom:'10px'}}>
                 ✓ All actions within budget, time and staff constraints
               </div>
            }
            <div>
              {chain.map((a,i)=>(
                <div key={i} className="step-item"
                  style={a.step===flashStep?{animation:'flashRed 2s ease',borderColor:'var(--red)'}:{}}
                  onClick={()=>setExpandedStep(e=>({...e,[i]:!e[i]}))}>
                  <div className="step-row">
                    <div className="step-num" style={{background:statusColor(a.status)}}>{a.step}</div>
                    <div className="step-body">
                      <div className="step-action">{a.action}</div>
                      <div className="step-sub">↳ {a.triggered_by}</div>
                      <div className="step-badges">
                        <span className={`badge ${statusBadge(a.status||'PENDING')}`}>{a.status||'PENDING'}</span>
                        <span className="badge badge-blue">PKR {(a.estimated_cost_pkr||0).toLocaleString()}</span>
                        <span className="badge badge-gray">{a.estimated_time_minutes||a.estimated_time_hours||0}m</span>
                        {a.feasible===false&&<span className="badge badge-amber">Modified</span>}
                      </div>
                    </div>
                    <span style={{color:'var(--muted)',fontSize:'12px'}}>{expandedStep[i]?'▲':'▼'}</span>
                  </div>
                  <div className={`step-detail${expandedStep[i]?' open':''}`}>
                    <div className="detail-row"><span className="detail-key">Enables:</span><span className="detail-val">{a.enables}</span></div>
                    <div className="detail-row"><span className="detail-key">Side effect:</span><span className="detail-val" style={{color:'var(--amber)'}}>{a.side_effect}</span></div>
                    <div className="detail-row"><span className="detail-key">Monitor:</span><span className="detail-val" style={{color:'var(--blue)'}}>{a.monitor}</span></div>
                  </div>
                </div>
              ))}
            </div>
            <button className="btn btn-green" style={{width:'100%',marginTop:'4px'}} onClick={handleExecute} disabled={executing||!chain.length}>
              {executing?<><span className="spinner"/>&nbsp;Executing chain...</>:'▶ Execute Chain'}
            </button>
          </>
        )}
      </div>

      {/* What-If Constraint Engine */}
      {analysisData&&(
        <div className="panel animate-fadeInUp">
          <div className="panel-header">
            <div className="panel-title"><div className="panel-title-dot" style={{background:'var(--purple)'}}/>What-If Constraint Engine</div>
            {whatIfData&&<span className="panel-badge badge-amber">{whatIfData.actions_modified} modified</span>}
          </div>
          <div style={{fontSize:'11px',color:'var(--muted)',marginBottom:'8px'}}>
            Re-run the action chain under different constraints — see how feasibility changes.
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:'10px'}}>
            {WHAT_IF_PRESETS.map(p=>(
              <button key={p.key} className={`btn btn-ghost`}
                style={{fontSize:'11px',padding:'7px 10px',textAlign:'left',flexDirection:'column',alignItems:'flex-start',gap:'2px',
                  borderColor:activeWhatIf===p.key?'var(--purple)':'',color:activeWhatIf===p.key?'var(--purple)':''}}
                onClick={()=>runWhatIf(p)} disabled={whatIfLoading}>
                <span style={{fontWeight:'700'}}>{p.label}</span>
                <span style={{fontSize:'9px',color:'var(--muted)',fontWeight:'400'}}>{p.desc}</span>
              </button>
            ))}
          </div>
          {whatIfLoading&&<div style={{textAlign:'center',padding:'12px',fontSize:'12px',color:'var(--muted)'}}><span className="spinner"/>&nbsp; Re-running agent chain...</div>}
          {whatIfData&&!whatIfLoading&&(
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',padding:'10px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}>
                <span style={{fontSize:'11px',fontWeight:'700',color:'var(--purple)'}}>
                  {whatIfData.preset?.label} Result
                </span>
                <span style={{fontSize:'10px',color:'var(--muted)'}}>{whatIfData.feasibility_summary}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',marginBottom:'8px'}}>
                {[
                  ['New Cost',`PKR ${(whatIfData.total_estimated_cost_pkr||0).toLocaleString()}`,'var(--blue)'],
                  ['Time',`${whatIfData.total_estimated_time_minutes||0}m`,'var(--cyan)'],
                  ['Modified',whatIfData.actions_modified+' actions',whatIfData.actions_modified>0?'var(--amber)':'var(--green)'],
                ].map(([l,v,c])=>(
                  <div key={l} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'4px',padding:'8px',textAlign:'center'}}>
                    <div style={{fontSize:'9px',color:'var(--muted)',textTransform:'uppercase',marginBottom:'3px'}}>{l}</div>
                    <div style={{fontSize:'13px',fontWeight:'800',color:c,fontFamily:'var(--mono)'}}>{v}</div>
                  </div>
                ))}
              </div>
              {/* Delta vs original */}
              {whatIfData.cost_delta_pkr!==0&&(
                <div style={{fontSize:'11px',padding:'6px 8px',background:whatIfData.cost_delta_pkr>0?'rgba(239,68,68,0.08)':'rgba(16,185,129,0.08)',
                  border:`1px solid ${whatIfData.cost_delta_pkr>0?'rgba(239,68,68,0.2)':'rgba(16,185,129,0.2)'}`,borderRadius:'4px',color:whatIfData.cost_delta_pkr>0?'var(--red)':'var(--green)'}}>
                  {whatIfData.cost_delta_pkr>0?'↑':'↓'} Cost delta: PKR {Math.abs(whatIfData.cost_delta_pkr).toLocaleString()} vs original plan
                </div>
              )}
              {/* Modified steps */}
              {(whatIfData.action_chain||[]).filter(a=>a.was_modified).map((a,i)=>(
                <div key={i} style={{marginTop:'6px',padding:'6px 8px',background:'var(--amber-dim)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:'4px'}}>
                  <div style={{fontSize:'9px',color:'var(--amber)',fontWeight:'700',textTransform:'uppercase',marginBottom:'3px'}}>Step {a.step} — Modified</div>
                  <div style={{fontSize:'10px',color:'var(--text2)'}}>{a.action}</div>
                  {(a.constraint_violations||[]).length>0&&<div style={{fontSize:'9px',color:'var(--red)',marginTop:'2px'}}>⚠ {a.constraint_violations.join(', ')}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Outcome Panel */}
      {executeData&&(
        <div className="panel animate-fadeInUp">
          <div className="panel-header">
            <div className="panel-title"><div className="panel-title-dot" style={{background:'var(--amber)'}}/>System Outcome</div>
          </div>
          <div className="metrics-strip">
            {[['Cost','PKR '+executeData.total_cost_pkr.toLocaleString()],
              ['Latency',executeData.total_latency_ms+'ms'],
              ['Failed',executeData.failures],
              ['Recovered',executeData.recovered]].map(([l,v])=>(
              <div key={l} className="metric-box"><div className="metric-lbl">{l}</div><div className="metric-val" style={{fontSize:'14px'}}>{v}</div></div>
            ))}
          </div>
          <div className="before-after">
            {['Before','After'].map((label,bi)=>{
              const st=bi===0?executeData.before_state:executeData.after_state;
              const other=bi===0?executeData.after_state:executeData.before_state;
              const fields=['status','actions_completed','total_cost_pkr','total_latency_ms','actions_failed','actions_recovered'];
              return(
                <div key={label} className="ba-col">
                  <div className="ba-header" style={{color:bi===0?'var(--muted)':'var(--blue)'}}>{label}</div>
                  {fields.map(f=>{const changed=String(st?.[f])!==String(other?.[f]);return(
                    <div key={f} className={`ba-row${changed&&bi===1?' changed':''}`}>
                      <span className="ba-key">{f.replace(/_/g,' ')}</span>
                      <span className="ba-val" style={changed&&bi===1?{color:'var(--amber)'}:{}}>{String(st?.[f]??'—')}</span>
                    </div>
                  );})}
                </div>
              );
            })}
          </div>
          {/* Real vs Simulated breakdown */}
          {(()=>{
            const steps=executeData.chain||[];
            const realSteps=steps.filter(s=>s.real_result?.real===true);
            const simSteps=steps.filter(s=>s.real_result?.real===false||!s.real_result);
            return(
              <div style={{marginBottom:'12px'}}>
                <div className="section-label">Execution Mode</div>
                <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'8px'}}>
                  {steps.map((a,i)=>{
                    const r=a.real_result;
                    const isReal=r?.real===true;
                    const ch=r?.channel||'simulated';
                    const icon=ch.includes('email')?'📧':ch.includes('sheet')?'📊':ch.includes('slack')||ch.includes('webhook')?'💬':'⚙️';
                    return(
                      <div key={i} style={{background:isReal?'rgba(167,139,250,0.1)':'var(--card2)',
                        border:`1px solid ${isReal?'rgba(167,139,250,0.4)':'var(--border)'}`,
                        borderRadius:'6px',padding:'6px 10px',fontSize:'11px'}}>
                        <div style={{fontWeight:'700',color:isReal?'#a78bfa':'var(--muted)'}}>
                          {icon} Step {a.step} — {isReal?'REAL':'simulated'}
                        </div>
                        <div style={{fontSize:'9px',color:'var(--muted)',marginTop:'2px'}}>{ch.replace(/_/g,' ')}</div>
                        {isReal&&r?.to&&<div style={{fontSize:'9px',color:'#a78bfa'}}>→ {r.to}</div>}
                        {isReal&&r?.sheet_url&&<div style={{fontSize:'9px',color:'#a78bfa',wordBreak:'break-all'}}>→ <a href={r.sheet_url} target="_blank" style={{color:'#a78bfa'}}>{r.sheet_url.slice(0,40)}...</a></div>}
                        {isReal&&r?.http_status&&<div style={{fontSize:'9px',color:'var(--green)'}}>HTTP {r.http_status}</div>}
                      </div>
                    );
                  })}
                </div>
                {realSteps.length===0&&(
                  <div style={{fontSize:'11px',color:'var(--amber)',padding:'8px',background:'var(--amber-dim)',borderRadius:'6px'}}>
                    ⚙ All steps running in simulation mode. Set SMTP_USER, GOOGLE_SHEET_ID, SLACK_WEBHOOK_URL env vars to activate real integrations.
                  </div>
                )}
                {realSteps.length>0&&(
                  <div style={{fontSize:'11px',color:'#a78bfa',padding:'8px',background:'rgba(167,139,250,0.08)',borderRadius:'6px',border:'1px solid rgba(167,139,250,0.2)'}}>
                    ✓ {realSteps.length} of {steps.length} actions executed with real API calls
                  </div>
                )}
              </div>
            );
          })()}

          {/* Side Effects */}
          <div className="section-label">Step Side Effects</div>
          <div>
            {(executeData.chain||[]).filter(a=>a.side_effect).map((a,i)=>(
              <div key={i} className="what-if-item">
                <div className="what-if-key">Step {a.step} · Monitor: {a.monitor}</div>
                <div className="what-if-val">{a.side_effect}</div>
              </div>
            ))}
          </div>

          {/* Risk Timeline */}
          <RiskTimeline executeData={executeData}/>

          <div className="divider"/>
          <button className="btn btn-ghost" style={{width:'100%',marginBottom:'6px'}} onClick={loadBaseline}>
            Compare vs Non-Agentic Baseline
          </button>
          {baseline&&(
            <table className="bl-table">
              <thead><tr><th>Capability</th><th>Simple</th><th>NEXUS</th></tr></thead>
              <tbody>
                {[['Contradiction detection','contradiction_detection'],
                  ['Credibility scoring','source_credibility_scoring'],
                  ['Temporal analysis','temporal_analysis'],
                  ['Failure recovery','failure_recovery'],
                  ['Chain depth','action_chain_depth'],
                  ['What-if analysis','what_if_analysis']].map(([label,key])=>(
                  <tr key={key}>
                    <td>{label}</td>
                    <td className={baseline.simple_heuristic[key]===true?'check-y':baseline.simple_heuristic[key]===false?'check-n':''}>
                      {baseline.simple_heuristic[key]===true?'✓':baseline.simple_heuristic[key]===false?'✗':baseline.simple_heuristic[key]}</td>
                    <td className={baseline.nexus_agentic[key]===true?'check-y':baseline.nexus_agentic[key]===false?'check-n':''}>
                      {baseline.nexus_agentic[key]===true?'✓':baseline.nexus_agentic[key]===false?'✗':baseline.nexus_agentic[key]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── LOG TERMINAL ─── */
function LogTerminal(){
  const [logs,setLogs]=useState([]);
  const bodyRef=useRef();
  useEffect(()=>{
    const id=setInterval(async()=>{
      try{const r=await fetch('/logs');const d=await r.json();setLogs(d.logs||[]);}catch(_){}
    },2000);
    return()=>clearInterval(id);
  },[]);
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[logs]);
  function lineClass(m){
    if(!m)return'log-line';
    const l=m.toLowerCase();
    if(l.includes('failed')||l.includes('error'))return'log-line fail';
    if(l.includes('recovered')||l.includes('retry'))return'log-line recover';
    if(l.includes('real email')||l.includes('real sheet')||l.includes('real webhook'))return'log-line real';
    if(l.includes('complete')||l.includes('success'))return'log-line info';
    return'log-line';
  }
  return(
    <div className="log-bar">
      <div className="log-header">
        <div className="log-title">⬡ Execution Terminal</div>
        <div className="log-live"><span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'pulse 1.5s infinite'}}/>LIVE</div>
      </div>
      <div className="log-body" ref={bodyRef}>
        {logs.length===0
          ?<span className="log-empty">Waiting for activity — ingest sources to begin...</span>
          :logs.map((l,i)=><div key={i} className={lineClass(l.message)}>[{l.time_display}] {l.message}</div>)
        }
      </div>
    </div>
  );
}

/* ─── NAVBAR ─── */
function NavBar({state,onAutoDemo,autoRunning,onStressTest,stressRunning}){
  async function exportTrace(){
    const r=await fetch('/export-trace');
    const b=await r.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);a.download='nexus_antigravity_trace.json';a.click();
    alert('Trace downloaded — submit nexus_antigravity_trace.json with your Antigravity logs');
  }
  const isExecuting=state?.status==='executing';
  const isActive=state?.sources_ingested>0;
  return(
    <div className="nav">
      <div className="nav-logo">
        <svg viewBox="0 0 20 20" fill="none"><polygon points="10,1 18,5.5 18,14.5 10,19 2,14.5 2,5.5" stroke="currentColor" strokeWidth="1.5"/><polygon points="10,5 14,7.5 14,12.5 10,15 6,12.5 6,7.5" fill="currentColor" opacity="0.4"/></svg>
        NEXUS
      </div>
      <div className="nav-subtitle">Challenge 1 — Autonomous Content-to-Action Agent</div>
      <div className="nav-metrics">
        <div className="nav-metric">
          <div className={`status-dot${isExecuting?' executing':isActive?' active':''}`}/>
          <span className="nav-metric-label">status</span>
          <span className="nav-metric-val">{state?.status||'idle'}</span>
        </div>
        <div className="nav-metric">
          <span className="nav-metric-label">sources</span>
          <span className="nav-metric-val">{state?.sources_ingested||0}</span>
        </div>
        <div className="nav-metric">
          <span className="nav-metric-label">contradictions</span>
          <span className="nav-metric-val">{state?.contradictions_found||0}</span>
        </div>
        <div className="nav-metric">
          <span className="nav-metric-label">cost</span>
          <span className="nav-metric-val">PKR {(state?.total_cost_pkr||0).toLocaleString()}</span>
        </div>
        <div className="nav-metric">
          <span className="nav-metric-label">recovered</span>
          <span className="nav-metric-val">{state?.actions_recovered||0}</span>
        </div>
      </div>
      <div className="nav-actions">
        <button className="btn btn-demo" onClick={onAutoDemo} disabled={autoRunning||stressRunning}>
          {autoRunning?<><span className="spinner"/>&nbsp;Running Demo...</>:'⚡ Auto Demo'}
        </button>
        <button className="btn btn-ghost" style={{borderColor:'var(--amber)',color:'var(--amber)'}} onClick={onStressTest} disabled={stressRunning||autoRunning}>
          {stressRunning?<><span className="spinner"/>&nbsp;Stress Test...</>:'🔴 Stress Test'}
        </button>
        <button className="btn btn-ghost" onClick={exportTrace}>↓ Export Trace</button>
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const [ingestData,setIngestData]=useState(null);
  const [analysisData,setAnalysisData]=useState(null);
  const [executeData,setExecuteData]=useState(null);
  const [state,setState]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [autoRunning,setAutoRunning]=useState(false);
  const [stressRunning,setStressRunning]=useState(false);
  const [domain,setDomain]=useState('Business');

  useEffect(()=>{
    const id=setInterval(async()=>{
      try{const r=await fetch('/state');const d=await r.json();setState(d);}catch(_){}
    },3000);
    return()=>clearInterval(id);
  },[]);

  function handleIngest(data,dom){setIngestData(data);setDomain(dom);}

  async function handleAnalyze(){
    setAnalyzing(true);
    try{
      const r=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({domain})});
      const d=await r.json();
      setAnalysisData(d);
    }catch(e){alert('Analysis failed: '+e.message);}
    setAnalyzing(false);
  }

  function handleExecute(data){setExecuteData(data);}

  async function stressTest(){
    setStressRunning(true);
    try{
      // Scenario 1: Hospital supply (Policy domain)
      const h=SEEDS.health;
      const fd1=new FormData();
      fd1.append('text',h.text);fd1.append('csv_data',h.csv);fd1.append('url','');
      fd1.append('domain',h.domain);fd1.append('topic',h.topic);fd1.append('include_feed','true');
      const ir1=await fetch('/ingest',{method:'POST',body:fd1});
      const id1=await ir1.json();setIngestData(id1);setDomain(h.domain);
      await sleep(600);
      const ar1=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain:h.domain})});
      const ad1=await ar1.json();setAnalysisData(ad1);
      await sleep(800);
      // Scenario 2: Switch to supply chain and trigger failure recovery
      const s=SEEDS.supply;
      const fd2=new FormData();
      fd2.append('text',s.text);fd2.append('csv_data',s.csv);fd2.append('url','');
      fd2.append('domain',s.domain);fd2.append('topic',s.topic);fd2.append('include_feed','true');
      const ir2=await fetch('/ingest',{method:'POST',body:fd2});
      const id2=await ir2.json();setIngestData(id2);setDomain(s.domain);
      await sleep(600);
      const ar2=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain:s.domain})});
      const ad2=await ar2.json();setAnalysisData(ad2);
      await sleep(800);
      const er=await fetch('/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chain:ad2.action_chain||[],domain:s.domain})});
      const ed=await er.json();setExecuteData(ed);
    }catch(e){alert('Stress test failed: '+e.message);}
    setStressRunning(false);
  }

  async function autoDemo(){
    setAutoRunning(true);
    try{
      // Load supply chain seed
      const s=SEEDS.supply;
      const fd=new FormData();
      fd.append('text',s.text);fd.append('csv_data',s.csv);fd.append('url','');
      fd.append('domain',s.domain);fd.append('topic',s.topic);fd.append('include_feed','true');
      const ir=await fetch('/ingest',{method:'POST',body:fd});
      const id=await ir.json();
      setIngestData(id);setDomain(s.domain);
      await sleep(800);
      const ar=await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({domain:s.domain})});
      const ad=await ar.json();
      setAnalysisData(ad);
      await sleep(1000);
      const er=await fetch('/execute',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chain:ad.action_chain||[],domain:s.domain})});
      const ed=await er.json();
      setExecuteData(ed);
    }catch(e){alert('Demo failed: '+e.message);}
    setAutoRunning(false);
  }

  return(
    <>
      <NavBar state={state} onAutoDemo={autoDemo} autoRunning={autoRunning} onStressTest={stressTest} stressRunning={stressRunning}/>
      <div className="workspace">
        <LeftCol onIngest={handleIngest} onAnalyzeClick={handleAnalyze} ingestData={ingestData} analyzing={analyzing}/>
        <CenterCol analysisData={analysisData}/>
        <RightCol analysisData={analysisData} onExecute={handleExecute} executeData={executeData}/>
        <LogTerminal/>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
